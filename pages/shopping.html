<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bangkok Guide</title>
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/card.css">
</head>
<body>

  <header class="top-bar">
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">☰</button>
    <span class="top-bar__title" id="topbar-title">Category</span>
  </header>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar__header">
      <a href="../index.html" class="sidebar__title" style="color: inherit; text-decoration: none;">Bangkok Guide</a>
      <div class="sidebar__subtitle">曼谷指南</div>
    </div>
    <ul class="sidebar-nav" id="sidebar-nav"></ul>
  </aside>

  <main class="main-content">
    <div class="main-content__header">
      <h1 class="main-content__title" id="page-title">Category</h1>
      <p class="main-content__description" id="page-desc"></p>
      <p class="main-content__count" id="page-count"></p>
    </div>

    <div class="filter-bar" id="filter-bar">
      <input type="text" class="filter-bar__search" id="search-input" placeholder="Search..." autocomplete="off">
      <div class="filter-bar__tags" id="tag-filters"></div>
    </div>

    <div class="card-grid" id="card-grid"></div>

    <footer class="footer">
      <p>Bangkok Guide &mdash; Personal travel knowledge base</p>
    </footer>
  </main>

  <script src="../js/loader.js"></script>
  <script src="../js/renderer.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/filter.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
